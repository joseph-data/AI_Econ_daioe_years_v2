name: Development → Main

on:
  push:
    branches:
      - development
  workflow_dispatch:
    inputs:
      source_branch:
        description: "Source branch to promote deploy files from"
        required: false
        default: "development"
      target_branch:
        description: "Target branch to push deploy files into"
        required: false
        default: "main"
  schedule:
    - cron: "45 0 * * *"  # daily at 00:45 UTC

concurrency:
  group: deploy-sync-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true


# ============ Promote deployable app files ============ #

jobs:
  sync-deploy-files:
    runs-on: ubuntu-latest
    env:
      SOURCE_BRANCH: ${{ github.event.inputs.source_branch || vars.SOURCE_BRANCH || 'development' }}
      TARGET_BRANCH: ${{ github.event.inputs.target_branch || vars.TARGET_BRANCH || 'main' }}

    steps:
      - name: Checkout source
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          ref: ${{ env.SOURCE_BRANCH }}
          path: source

      - name: Validate deploy files
        run: |
          set -euo pipefail
          cd source
          required_files=(
            "app.py"
            "src/setup.py"
            "src/calcs.py"
            "src/visuals.py"
            "_brand.yml"
            "logos/lab.svg"
            "md_files/intro.md"
            "data/daioe_scb_years_processed.parquet"
            "Dockerfile"
            ".dockerignore"
            "pyproject.toml"
            "uv.lock"
            ".python-version"
          )

          for file in "${required_files[@]}"; do
            if [ ! -f "$file" ]; then
              echo "ERROR: Missing required deploy file: $file"
              exit 1
            fi
          done

      - name: Create deploy bundle
        run: |
          set -euo pipefail
          cd source
          files=(
            "app.py"
            "src/setup.py"
            "src/calcs.py"
            "src/visuals.py"
            "_brand.yml"
            "logos/lab.svg"
            "md_files/intro.md"
            "data/daioe_scb_years_processed.parquet"
            "Dockerfile"
            ".dockerignore"
            "pyproject.toml"
            "uv.lock"
            ".python-version"
          )

          if [ -f "README.md" ]; then
            files+=("README.md")
          fi

          tar -czf ../deploy-files.tgz "${files[@]}"

      - name: Checkout target
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          ref: ${{ env.TARGET_BRANCH }}
          path: target

      - name: Apply deploy bundle
        run: |
          set -euo pipefail
          tar -xzf deploy-files.tgz -C target

      - name: Commit and push
        working-directory: target
        run: |
          set -euo pipefail
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -- \
            app.py \
            src/setup.py \
            src/calcs.py \
            src/visuals.py \
            _brand.yml \
            logos/lab.svg \
            md_files/intro.md \
            data/daioe_scb_years_processed.parquet \
            Dockerfile \
            .dockerignore \
            pyproject.toml \
            uv.lock \
            .python-version

          if [ -f "README.md" ]; then
            git add README.md
          fi

          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          git commit -m "chore: promote deployable app files [skip ci]"
          git push origin "${TARGET_BRANCH}"